name: Order Management CI

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Build Application
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      -  name: Build Docker Image
         run: |
            docker build \
            -t kundan045/order-management:latest \
            -t kundan045/order-management:${{ github.run_number }} .

      - name: Push Latest
        run: docker push kundan045/order-management:latest

      - name: Push Version Tag
        run: docker push kundan045/order-management:${{ github.run_number }}